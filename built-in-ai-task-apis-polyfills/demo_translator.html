<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translator API Polyfill Test</title>
    <style>
      :root {
        color-scheme: dark light;
      }

      html {
        box-sizing: border-box;
      }

      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }

      body {
        font-family: system-ui, sans-serif;
        max-width: clamp(320px, 90%, 1000px);
        margin: auto;
      }

      textarea {
        width: 100%;
        height: 150px;
      }

      button {
        cursor: pointer;
      }

      progress {
        width: 100%;
      }

      .output {
        border: 1px solid #ccc;
        padding: 1rem;
        min-height: 100px;
        white-space: pre-wrap;
      }

      .controls {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
        align-items: center;
      }
    </style>
  </head>

  <body>
    <h1>Translator API Polyfill Test</h1>

    <p>
      This page tests the Translator API polyfill.
      <strong
        >Make sure to set a backend config in the console or edit this
        file!</strong
      >
    </p>

    <div class="controls">
      <label>
        Source:
        <select id="sourceLanguage">
          <option value="en" selected>English</option>
          <option value="de">German</option>
          <option value="fr">French</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
        </select>
      </label>
      <label>
        Target:
        <select id="targetLanguage">
          <option value="en">English</option>
          <option value="de" selected>German</option>
          <option value="fr">French</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
        </select>
      </label>
    </div>

    <textarea id="input">
Hello, how are you today? I hope you are having a wonderful time.</textarea
    >

    <progress id="progress" value="0" max="1" style="display: none"></progress>
    <div id="status"></div>

    <div class="controls">
      <button id="translateBtn">Translate</button>
      <button id="translateStreamingBtn">Translate Streaming</button>
    </div>

    <h2>Output</h2>
    <div id="output" class="output"></div>

    <script type="module">
      import firebaseConfig from './.env.json' with { type: 'json' };

      // Set FIREBASE_CONFIG to select the Firebase backend
      window.FIREBASE_CONFIG = firebaseConfig;

      import { Translator } from './translator-api-polyfill.js';

      const input = document.getElementById('input');
      const sourceLanguage = document.getElementById('sourceLanguage');
      const targetLanguage = document.getElementById('targetLanguage');
      const translateBtn = document.getElementById('translateBtn');
      const translateStreamingBtn = document.getElementById(
        'translateStreamingBtn'
      );
      const output = document.getElementById('output');
      const progress = document.getElementById('progress');
      const status = document.getElementById('status');

      let translator = null;
      let currentSource = '';
      let currentTarget = '';

      async function getTranslator() {
        const src = sourceLanguage.value;
        const tgt = targetLanguage.value;

        if (translator && currentSource === src && currentTarget === tgt) {
          return translator;
        }

        if (translator) {
          translator.destroy();
        }

        status.textContent = 'Initializing translator...';
        translator = await Translator.create({
          sourceLanguage: src,
          targetLanguage: tgt,
          monitor: (m) => {
            progress.style.display = 'block';
            m.addEventListener('downloadprogress', (e) => {
              progress.value = e.loaded;
              progress.max = e.total;
              status.textContent = `Downloading model: ${Math.round((e.loaded / e.total) * 100)}%`;
              if (e.loaded === e.total) {
                status.textContent = 'Model loaded.';
                setTimeout(() => (progress.style.display = 'none'), 1000);
              }
            });
          },
        });
        currentSource = src;
        currentTarget = tgt;
        status.textContent = 'Ready.';
        return translator;
      }

      translateBtn.onclick = async () => {
        output.textContent = 'Translating...';
        try {
          const t = await getTranslator();
          const result = await t.translate(input.value);
          output.textContent = result;
          status.textContent = 'Translation complete.';
        } catch (err) {
          output.textContent = 'Error: ' + err.message;
        }
      };

      translateStreamingBtn.onclick = async () => {
        output.textContent = '';
        try {
          const t = await getTranslator();
          const stream = t.translateStreaming(input.value);
          for await (const chunk of stream) {
            output.textContent = chunk;
          }
          status.textContent = 'Streaming translation complete.';
        } catch (err) {
          output.textContent = 'Error: ' + err.message;
        }
      };
    </script>
  </body>
</html>
