<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperAudio - Intelligent Speaker Store</title>
    <style>
        :root {
            --bg: #f8fafc;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
            --primary: #ef4444;
            --primary-glow: rgba(239, 68, 68, 0.2);
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-columns: 1fr 350px;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Content Area */
        main {
            padding: 3rem;
            overflow-y: auto;
            background: radial-gradient(circle at center, #fee2e2 0%, var(--bg) 70%);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #ef4444, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-selector {
            display: flex;
            gap: 1rem;
        }

        button {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        /* Tabs for specs */
        .tabs-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid transparent;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            backdrop-filter: none;
            box-shadow: none;
            color: var(--text-muted);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border);
            color: var(--text);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .product-display {
            padding: 1rem;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-title {
            font-size: 2rem;
            margin: 0;
            font-weight: 700;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .spec-row {
            background: rgba(255, 255, 255, 0.02);
            padding: 1.25rem;
            border-radius: 16px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .spec-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border);
        }

        .spec-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .spec-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .reviews-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .review-card {
            background: rgb(255 62 62 / 11%);
            padding: .5rem;
            border: 1px solid transparent;
            font-style: italic;
        }

        mark, .glow-highlight {
            background-color: #fef08a;
            color: #0f172a;
        }

        /* Sidebar for Logs */
        .sidebar {
            background: rgba(5, 5, 10, 0.8);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            overflow-y: scroll;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.02);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid transparent;
            animation: slideIn 0.2s ease-out;
            word-break: break-all;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry.tracker { border-color: #34d399; color: #34d399; }
        .log-entry.ai-in { border-color: #a5b4fc; color: #a5b4fc; }
        .log-entry.ai-out { border-color: #c084fc; color: #e879f9; }
        .log-entry.system { border-color: #6b7280; color: #9ca3af; }
        .log-entry.loading { animation: pulse 1.5s infinite; }

        .personalize-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            color: white;
            font-weight: 700;
            padding: 1rem 2rem;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .personalize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: white;
            color: var(--text);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            opacity: 0;
            z-index: 1000;
            font-weight: 600;
            border: 1px solid var(--primary);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <main>
        <header>
            <h1>HyperAudio</h1>
            <div class="product-selector">
                <button id="btn-prod-1" class="active" onclick="app.loadProduct(1)">Product A</button>
                <button id="btn-prod-2" onclick="app.loadProduct(2)">Product B</button>
                <button id="btn-prod-3" onclick="app.loadProduct(3)">Product C</button>
            </div>
        </header>

        <div class="product-display" id="product-view">
            <!-- Dynamic Content Here -->
        </div>
    </main>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">Debugging logs</h2>
            <button onclick="app.clearLogs()" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Clear</button>
        </div>
        <div class="log-container" id="log-container">
            <!-- Logs will appear here -->
        </div>
    </div>

    <script>
        // --- 1. Data Layer ---
        const products = [
            {
                id: 1,
                name: "SonicBlast Go",
                specs: {
                    "Power": {
                        battery: "12 hours Runtime",
                        power: "20W Audio Power",
                        charging: "USB-C Fast Charge"
                    },
                    "Durability": {
                        waterproof: "IPX7 Waterproof Rating",
                        shockproof: "Drop resistant up to 1.5m"
                    },
                    "Portability": {
                        weight: "500g Weight",
                        dimensions: "15x8x8 cm"
                    }
                },
                reviews: [
                    "Great for the pool, very waterproof. I take it everywhere.",
                    "Battery lasts all day on a single charge, amazing.",
                    "A bit heavy for its size, but sounds good.",
                    "USB-C charging is super fast, love it.",
                    "20W is surprisingly loud, perfect for parties.",
                    "Dropped it on the concrete twice, not a scratch."
                ]
            },
            {
                id: 2,
                name: "AuraWave Pro",
                specs: {
                    "Power": {
                        battery: "24 hours Runtime",
                        power: "40W Audio Power",
                        charging: "Wireless Qi Supported"
                    },
                    "Durability": {
                        waterproof: "IP67 Dust & Waterproof",
                        shockproof: "Rugged design"
                    },
                    "Portability": {
                        weight: "800g Weight",
                        dimensions: "20x10x10 cm"
                    }
                },
                reviews: [
                    "Incredible battery life, I rarely charge it.",
                    "Dustproof and waterproof, perfect for camping.",
                    "Heavy, but the sound fills the room.",
                    "Wireless charging is so convenient on my desk.",
                    "40W power really fills the room with deep bass.",
                    "Dropped it on rocks while hiking, still works perfectly."
                ]
            },
            {
                id: 3,
                name: "LiteBeat Mini",
                specs: {
                    "Power": {
                        battery: "6 hours Runtime",
                        power: "5W Audio Power",
                        charging: "Micro USB"
                    },
                    "Durability": {
                        waterproof: "IPX5 Splash resistant",
                        shockproof: "Not rated"
                    },
                    "Portability": {
                        weight: "200g Weight",
                        dimensions: "10x5x5 cm"
                    }
                },
                reviews: [
                    "Super light, fits in my pocket easily.",
                    "Water resistance is just okay for light rain. Don't drop it in the pool.",
                    "Not very powerful, but good for quiet listening.",
                    "Micro USB is a bit dated, I wish it was USB-C.",
                    "6 hours is enough for a small outing, but not all day.",
                    "I'm afraid to drop it since it has no shock rating."
                ]
            }
        ];

        // --- 2. Tracking Engine ---
        class BehaviorTracker {
            constructor() {
                this.userInterests = [];
                this.hoverTimers = new Map();
                this.initSelectionListener();
            }

            initSelectionListener() {
                document.addEventListener('mouseup', (event) => {
                    const selectedText = window.getSelection().toString().trim();
                    if (selectedText.length > 3) {
                        // Check if selection is within specs or reviews
                        const isWithinSpecs = event.target.closest('.spec-row');
                        const isWithinReviews = event.target.closest('.review-card');
                        
                        if (isWithinSpecs || isWithinReviews) {
                            this.logEvent('Selection', selectedText);
                            this.userInterests.push(selectedText);
                        }
                    }
                });
            }

            initHoverListeners() {
                const elements = document.querySelectorAll('.spec-row, .review-card');
                this.logEvent('Debug', `Found ${elements.length} elements for hover listeners`);
                elements.forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        const value = el.dataset.specValue || el.textContent.trim();
                        const timer = setTimeout(() => {
                            this.logEvent('Hover', value);
                            this.userInterests.push(value);
                        }, 1000); // 1 second threshold for hover
                        this.hoverTimers.set(el, timer);
                    });
                    
                    el.addEventListener('mouseleave', () => {
                        if (this.hoverTimers.has(el)) {
                            clearTimeout(this.hoverTimers.get(el));
                            this.hoverTimers.delete(el);
                        }
                    });
                });
            }

            trackTabClick(category) {
                this.logEvent('TabClick', category);
                this.userInterests.push(`Interested in ${category}`);
            }

            logEvent(type, value) {
                // CRITICAL: User requirement to use specific log format
                console.log(`[TRACKER] Event: ${type}, Value: ${value}`);
                app.appendLog(`[TRACKER] Event: ${type}, Value: "${value}"`, 'tracker');
            }
        }

        // --- 3. Application Logic ---
        class App {
            constructor() {
                this.currentProduct = null;
                this.tracker = new BehaviorTracker();
                this.aiSession = null;
                this.init();
            }

            async init() {
                this.loadProduct(1); // Load Product A by default
                this.initAI();
            }

            async initAI() {
                try {
                    // CRITICAL: Check availability using recorded docs syntax
                    if (typeof LanguageModel === 'undefined') {
                         this.appendLog('System: LanguageModel not found. Check flags!', 'system');
                         return;
                    }
                    
                    const availability = await LanguageModel.availability();
                    this.appendLog(`System: AI Availability = ${availability}`, 'system');
                    
                    if (availability === 'no') {
                        this.appendLog('System: Model not available.', 'system');
                        return;
                    }

                    // Create main session
                    this.aiSession = await LanguageModel.create({
                        initialPrompts: [
                            {
                                role: 'system',
                                content: 'You are a shopping assistant. Based on the user\'s past interactions, identify specific text in the current product\'s specs or reviews that matches their interests. Return ONLY valid JSON.'
                            }
                        ]
                    });
                    this.appendLog('System: AI Session initialized.', 'system');

                } catch (e) {
                    this.appendLog(`System error: ${e.message}`, 'system');
                }
            }

            loadProduct(id) {
                const product = products.find(p => p.id === id);
                // CRITICAL: User requirement to use word "chosen" instead of "sticking with"
                this.appendLog(`System: User has chosen product: ${product.name}`, 'system');
                this.currentProduct = product;
                this.renderProduct(product);
                
                // Update UI buttons
                document.querySelectorAll('.product-selector button').forEach(b => b.classList.remove('active'));
                const activeBtn = document.getElementById(`btn-prod-${id}`);
                if (activeBtn) activeBtn.classList.add('active');

                // Init hover listeners for new DOM elements
                setTimeout(() => this.tracker.initHoverListeners(), 100);

                // Auto-trigger personalization if interests exist
                if (this.tracker.userInterests.length > 0) {
                    this.triggerPersonalization();
                }
            }

            renderProduct(product) {
                const view = document.getElementById('product-view');
                const categories = Object.keys(product.specs);
                
                view.innerHTML = `
                    <h2 class="product-title">${product.name}</h2>
                    
                    <div class="tabs-container">
                        ${categories.map((cat, index) => `
                            <button class="tab-btn ${index === 0 ? 'active' : ''}" data-index="${index}">${cat}</button>
                        `).join('')}
                    </div>

                    <div class="tabs-content">
                        ${Object.entries(product.specs).map(([cat, specs], index) => `
                            <div class="tab-pane ${index === 0 ? 'active' : ''}" data-pane-index="${index}">
                                <div class="specs-grid">
                                    ${Object.entries(specs).map(([key, val]) => `
                                        <div class="spec-row" data-spec-value="${val}">
                                            <div class="spec-label">${key}</div>
                                            <div class="spec-value">${val}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="reviews-section">
                        <h3>Community Reviews</h3>
                        ${product.reviews.map(r => `<div class="review-card">${r}</div>`).join('')}
                    </div>
                `;

                // Add event listeners for tabs
                view.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const index = btn.getAttribute('data-index');
                        const catName = btn.textContent;
                        
                        // Update active button
                        view.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        
                        // Update active pane
                        view.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                        view.querySelector(`.tab-pane[data-pane-index="${index}"]`).classList.add('active');
                        
                        // Track tab click
                        this.tracker.trackTabClick(catName);
                    });
                });
            }


            async triggerPersonalization() {
                if (!this.aiSession) {
                    this.appendLog('System: AI Session not ready.', 'system');
                    return;
                }

                const interests = this.tracker.userInterests;
                if (interests.length === 0) {
                    this.appendLog('System: No user interests tracked yet. Click or dwell on features!', 'system');
                    return;
                }

                const logContainer = document.getElementById('log-container');
                const loadingEl = document.createElement('div');
                loadingEl.className = 'log-entry system loading';
                loadingEl.textContent = '✨ AI Personalizing content based on user interests...';
                logContainer.appendChild(loadingEl);
                logContainer.scrollTop = logContainer.scrollHeight;

                const tabClicks = interests.filter(i => i.startsWith('Interested in '));
                const otherInterests = interests.filter(i => !i.startsWith('Interested in '));

                const currentProductText = JSON.stringify({
                    name: this.currentProduct.name,
                    specs: this.currentProduct.specs,
                    reviews: this.currentProduct.reviews
                });

                // CRITICAL: Logging format reqs
                this.appendLog(`[AI INPUT] Tab Clicks: ${JSON.stringify(tabClicks)} | Other: ${JSON.stringify(otherInterests)} | Context: "${this.currentProduct.name} text..."`, 'ai-in');

                const prompt = `
User Explicit Tab Clicks (Indicating high interest in these categories):
${JSON.stringify(tabClicks)}

Other User Interactions (Dwell time >3s or text selection):
${JSON.stringify(otherInterests)}

Current Product Data:
${currentProductText}

Analyze the Product Data and find text snippets that match the User Interests. Prioritize matches in categories the user clicked on. Break down the matches into specific snippets.
`;

                // CRITICAL: JSON Schema defined by user
                const schema = {
                    type: "object",
                    properties: {
                        highlight_targets: {
                            type: "array",
                            items: {
                                type: "object",
                                properties: {
                                    text_snippet: { type: "string" },
                                    relevance_score: { type: "number" },
                                    category: { type: "string" }
                                },
                                required: ["text_snippet", "relevance_score", "category"]
                            }
                        }
                    },
                    required: ["highlight_targets"],
                    additionalProperties: false
                };

                try {
                    // Use the session to prompt
                    const response = await this.aiSession.prompt(prompt, {
                        responseConstraint: schema // Using responseConstraint as per docs
                    });

                    // CRITICAL: Logging format reqs
                    this.appendLog(`[AI OUTPUT] Raw JSON: ${response}`, 'ai-out');

                    const result = JSON.parse(response);
                    
                    if (result.highlight_targets) {
                        this.applyHighlights(result.highlight_targets);
                        
                        // Extract unique categories for toast
                        const categories = [...new Set(result.highlight_targets.map(t => t.category))];
                        this.appendLog(`[TOAST DEBUG] Categories: ${JSON.stringify(categories)}`, 'system');
                        if (categories.length > 0) {
                            this.showToast(`Highlighted based on what you care about: ${categories.join(', ')}`);
                        }
                    }
                    this.appendLog('✨ AI Personalization complete.', 'system');

                } catch (e) {
                    this.appendLog(`AI Error: ${e.message}`, 'system');
                    console.error('AI Error:', e);
                } finally {
                    loadingEl.remove();
                }
            }

            // --- 4. UI/UX Highlights ---
            applyHighlights(targets) {
                const view = document.getElementById('product-view');
                let html = view.innerHTML;

                // Filter targets threshold > 0.7
                const filtered = targets.filter(t => t.relevance_score > 0.7);

                filtered.forEach(target => {
                    const snippet = target.text_snippet;
                    if (!snippet) return;

                    // Simple case-insensitive matching
                    const regex = new RegExp(`(${this.escapeRegex(snippet)})`, 'gi');
                    
                    // Avoid breaking HTML tags by being careful where we replace
                    // A robust implementation would use DOM traversal, but for a prototype, 
                    // a string replace on specific parts or text nodes is safer.
                    // Here we do a simple replace, warning: might break if snippet is inside an attr.
                    
                    this.appendLog(`[UI UPDATE] Highlighting "${snippet}" with score ${target.relevance_score}.`, 'system');

                    html = html.replace(regex, '<mark>$1</mark>');
                });

                view.innerHTML = html;

                // Re-attach hover listeners since innerHTML destroyed them
                setTimeout(() => this.tracker.initHoverListeners(), 100);
            }

            showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => toast.classList.add('show'), 10);
                
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            escapeRegex(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            appendLog(text, type) {
                const container = document.getElementById('log-container');
                const el = document.createElement('div');
                el.className = `log-entry ${type}`;
                el.textContent = text;
                container.appendChild(el);
                container.scrollTop = container.scrollHeight;
            }

            clearLogs() {
                document.getElementById('log-container').innerHTML = '';
            }
        }

        // Initialize App
        const app = new App();
    </script>
</body>
</html>
