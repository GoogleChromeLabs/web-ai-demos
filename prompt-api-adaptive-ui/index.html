<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperAudio - Intelligent Speaker Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔊</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
            --primary: #ef4444;
            --primary-glow: rgba(239, 68, 68, 0.2);
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #ef4444;
            --highlight-color: #ffe000;
            --highlight-color-dark: #ffbf00;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: grid;
            grid-template-columns: 1fr 350px;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Content Area */
        main {
            padding: 3rem;
            overflow-y: auto;
            background: radial-gradient(circle at center, #fee2e2 0%, var(--bg) 70%);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Fugaz One', cursive, sans-serif;
            font-size: 2.6rem;
            margin: 0;
            background: linear-gradient(to right, #ef4444, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-subtitle {
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 0.25rem;
            display: block;
        }
        .header-subtitle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .header-subtitle a:hover {
            color: #b91c1c;
            text-decoration: underline;
        }

        .product-selector {
            display: flex;
            gap: 1rem;
            button {
                font-family: 'Fugaz One', cursive, sans-serif;
            }
        }

        button {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        /* Tabs for specs */
        .tabs-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid transparent;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            backdrop-filter: none;
            box-shadow: none;
            color: var(--text-muted);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-border);
            color: var(--text);
        }

        /* Glowing pulsing gold indicator for highlighted tabs */
        .tab-btn.has-highlight {
            position: relative;
        }
        .tab-btn.has-highlight::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #fbd700;
            box-shadow: 0 0 8px #ffe005;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .product-display {
            padding: 1rem;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-title {
            font-family: 'Fugaz One', cursive, sans-serif;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 0.02em;
        }

        .tabs-content {
            min-height: 260px;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .spec-row {
            background: rgba(255, 255, 255, 0.02);
            padding: 1.25rem;
            border-radius: 16px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .spec-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border);
        }

        .spec-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .spec-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .reviews-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .review-card {
            background: rgb(255 62 62 / 11%);
            padding: .5rem;
            border: 1px solid transparent;
            font-style: italic;
        }

        mark, .glow-highlight {
            background-color: var(--highlight-color);
            color: #0f172a;
        }

        /* Sidebar for Logs */
        .sidebar {
            background: rgba(5, 5, 10, 0.8);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            overflow-y: scroll;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.02);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid transparent;
            animation: slideIn 0.2s ease-out;
            word-break: break-all;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry.tracker { border-color: #34d399; color: #34d399; }
        .log-entry.ai-input { border-color: #a5b4fc; color: #a5b4fc; }
        .log-entry.ai-output { border-color: #c084fc; color: #e879f9; }
        .log-entry.system { border-color: #6b7280; color: #9ca3af; }
        .log-entry.loading { animation: pulse 1.5s infinite; }

        .personalize-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            color: white;
            font-weight: 700;
            padding: 1rem 2rem;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .personalize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            transform: translateY(100px);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            padding: 1rem 1.25rem;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
            opacity: 0;
            z-index: 1000;
            border: 1px solid rgba(239, 68, 68, 0.25);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.75rem;
            width: 280px;
            pointer-events: auto;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-title {
            font-weight: 600;
            font-size: 0.875rem;
            line-height: 1.4;
        }
        .toast-title mark {
            background-color: var(--highlight-color);
            color: #0f172a;
            padding: 0 0.2rem;
        }
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .interest-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .interest-badge:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            transform: translateY(-1px);
        }

        /* Personalization Tuning Panel Styles */
        .toast-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 1.5rem;
        }
        .toast-tune-toggle {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 0.4rem;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: block;
            width: calc(100% - 0.5rem);
            text-align: center;
            box-sizing: border-box;
            margin-top: 0.5rem;
            transition: all 0.2s ease;
            box-shadow: none;
            backdrop-filter: none;
        }
        .toast-tune-toggle:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .toast-tune-panel {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.5rem;
            border-top: 1px dashed rgba(239, 68, 68, 0.15);
            padding-top: 0.75rem;
            max-height: 250px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .toast.expanded {
            max-width: 320px;
        }
        .toast.expanded .toast-tune-panel {
            display: flex;
        }
        .toast-tune-panel::-webkit-scrollbar {
            width: 4px;
        }
        .toast-tune-panel::-webkit-scrollbar-thumb {
            background: rgba(239, 68, 68, 0.25);
            border-radius: 4px;
        }
        .tune-section {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            width: 100%;
        }
        .tune-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.15rem;
            text-align: left;
        }
        .tune-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.04);
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            gap: 0.5rem;
            width: calc(100% - 1.2rem);
        }
        .tune-item-text {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-grow: 1;
            text-align: left;
        }
        .tune-item-category {
            font-size: 0.62rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            margin-left: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            display: inline-block;
            vertical-align: middle;
        }
        .tune-item-remove {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
            box-shadow: none;
            backdrop-filter: none;
        }
        .tune-item-remove:hover {
            background: rgba(239, 68, 68, 0.15);
        }
        .tune-add-box {
            display: flex;
            gap: 0.35rem;
            width: calc(100% - 0.5rem);
            margin-top: 0.25rem;
        }
        .tune-add-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 0.35rem 0.6rem;
            font-size: 0.75rem;
            outline: none;
            color: var(--text);
            transition: border-color 0.2s;
        }
        .tune-add-input:focus {
            border-color: var(--primary);
        }
        .tune-add-btn {
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 8px;
            padding: 0 0.6rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
            backdrop-filter: none;
        }
        .tune-add-btn:hover {
            background: #b91c1c;
        }
        .interest-badge-remove {
            background: none;
            border: none;
            padding: 0;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
            box-shadow: none;
            backdrop-filter: none;
        }
        .interest-badge-remove:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #b91c1c;
            transform: none;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Product Layout - Premium Split Column */
        .product-layout {
            display: grid;
            grid-template-columns: 45% 50%;
            gap: 5%;
            align-items: start;
        }

        .product-image-container {
            position: sticky;
            top: 2rem;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--glass-border);
            background: var(--glass);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            aspect-ratio: 1.2;
        }

        .product-image-container:hover {
            transform: scale(1.02) translateY(-6px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-image-container:hover .product-image {
            transform: scale(1.06);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .reviews-section h3 {
            font-family: 'Fugaz One', cursive, sans-serif;
            font-size: 1.3rem;
            margin: 0 0 1rem 0;
            color: var(--text);
        }

        /* Sidebar Clear Button Style */
        .clear-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9);
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
            transform: translateY(-1px);
        }

        @media (max-width: 1024px) {
            .product-layout {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .product-image-container {
                position: relative;
                aspect-ratio: 16/10;
            }
        }
    </style>
</head>
<body>

    <main>
        <header>
            <div>
                <h1>HyperAudio</h1>
                <span class="header-subtitle">Demo <a href="https://github.com/maudnals" target="_blank">@maudnals</a>.</span>
            </div>
            <div class="product-selector">
                <button id="btn-prod-1" class="active" onclick="app.loadProduct(1)">Product A</button>
                <button id="btn-prod-2" onclick="app.loadProduct(2)">Product B</button>
                <button id="btn-prod-3" onclick="app.loadProduct(3)">Product C</button>
            </div>
        </header>

        <div class="product-display" id="product-view">
            <!-- Dynamic Content Here -->
        </div>
    </main>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">Debugging logs</h2>
            <button class="clear-btn" onclick="app.clearLogs()">Clear</button>
        </div>
        <div class="log-container" id="log-container">
            <!-- Logs will appear here -->
        </div>
    </div>

    <script>
        // --- 1. Data Layer ---
        const products = [
            {
                id: 1,
                name: "SonicBlast Go",
                image: "img/speaker-3.png",
                specs: {
                    "Power": {
                        battery: "12 hours Runtime",

                    },
                    "Durability": {

                    },
                    "Portability": {

                    }
                },
                reviews: [

                    "A bit heavy for its size, but sounds good.",
                    "USB-C charging is super fast, love it.",
                    "20W is surprisingly loud, perfect for parties.",
                    "Dropped it on the concrete twice, not a scratch."
                ]
            },
            {
                id: 2,
                name: "AuraWave Pro",
                image: "img/speaker-1.png",
                specs: {
                    "Power": {
                        battery: "24 hours Runtime",
                        power: "40W Audio Power",
                        charging: "Wireless Qi Supported"
                    },
                    "Durability": {
                        waterproof: "IP67 Dust & Waterproof",
                        shockproof: "Rugged design"
                    },
                    "Portability": {
                        weight: "800g Weight",
                        dimensions: "20x10x10 cm"
                    }
                },
                reviews: [
                    "Incredible battery life, I rarely charge it.",
                    "Dustproof and waterproof, perfect for camping.",
                    "Heavy, but the sound fills the room.",
                    "Wireless charging is so convenient on my desk.",
                    "40W power really fills the room with deep bass.",
                    "Dropped it on rocks while hiking, still works perfectly."
                ]
            },
            {
                id: 3,
                name: "LiteBeat Mini",
                image: "img/speaker-2.png",
                specs: {
                    "Power": {
                        battery: "6 hours Runtime",
                        power: "5W Audio Power",
                        charging: "Micro USB"
                    },
                    "Durability": {
                        waterproof: "IPX5 Splash resistant",
                        shockproof: "Not rated"
                    },
                    "Portability": {
                        weight: "200g Weight",
                        dimensions: "10x5x5 cm"
                    }
                },
                reviews: [
                    "Super light, fits in my pocket easily.",
                    "Water resistance is just okay for light rain. Don't drop it in the pool.",
                    "Not very powerful, but good for quiet listening.",
                    "Micro USB is a bit dated, I wish it was USB-C.",
                    "6 hours is enough for a small outing, but not all day.",
                    "I'm afraid to drop it since it has no shock rating."
                ]
            }
        ];

        // --- 2. Tracking Engine ---
        class BehaviorTracker {
            constructor() {
                this.userInterests = [];
                this.hoverTimers = new Map();
                this.initSelectionListener();
            }

            initSelectionListener() {
                document.addEventListener('mouseup', (event) => {
                    const selectedText = window.getSelection().toString().trim();
                    if (selectedText.length > 3) {
                        // Check if selection is within specs or reviews
                        const isWithinSpecs = event.target.closest('.spec-row');
                        const isWithinReviews = event.target.closest('.review-card');
                        
                        if (isWithinSpecs || isWithinReviews) {
                            this.logEvent('Selection', selectedText);
                            this.userInterests.push(selectedText);
                        }
                    }
                });
            }

            initHoverListeners() {
                const elements = document.querySelectorAll('.spec-row, .review-card');
                this.logEvent('Debug', `Found ${elements.length} elements for hover listeners`);
                elements.forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        const value = el.dataset.specValue || el.textContent.trim();
                        const timer = setTimeout(() => {
                            this.logEvent('Hover', value);
                            this.userInterests.push(value);
                        }, 1000); // 1 second threshold for hover
                        this.hoverTimers.set(el, timer);
                    });
                    
                    el.addEventListener('mouseleave', () => {
                        if (this.hoverTimers.has(el)) {
                            clearTimeout(this.hoverTimers.get(el));
                            this.hoverTimers.delete(el);
                        }
                    });
                });
            }

            trackTabClick(category) {
                this.logEvent('TabClick', category);
                this.userInterests.push(`Interested in ${category}`);
            }

            logEvent(type, value) {
                // CRITICAL: User requirement to use specific log format
                console.log(`Event: ${type}, Value: ${value}`);
                app.appendLog(`Event: ${type}, Value: "${value}"`, 'tracker');
            }
        }

        // --- 3. Application Logic ---
        class App {
            constructor() {
                this.currentProduct = null;
                this.tracker = new BehaviorTracker();
                this.aiSession = null;
                this.customInterests = [];
                this.removedCategories = new Set();
                this.lastHighlightTargets = [];
                this.isTunePanelExpanded = false;
                this.init();
            }

            async init() {
                this.loadProduct(1); // Load Product A by default
                this.initAI();
                this.updateToastUI();
                
                // Setup event delegation for product specs tabs inside #product-view
                const view = document.getElementById('product-view');
                view.addEventListener('click', (e) => {
                    const btn = e.target.closest('.tab-btn');
                    if (!btn) return;
                    
                    const index = btn.getAttribute('data-index');
                    const catName = btn.textContent.trim();
                    
                    // Update active tab button state
                    view.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Update active content specs pane state
                    view.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    const targetPane = view.querySelector(`.tab-pane[data-pane-index="${index}"]`);
                    if (targetPane) {
                        targetPane.classList.add('active');
                    }
                    
                    // Track tab click
                    this.tracker.trackTabClick(catName);
                });
            }

            async initAI() {
                try {
                    // CRITICAL: Check availability using recorded docs syntax
                    if (typeof LanguageModel === 'undefined') {
                         this.appendLog('LanguageModel not found. Check flags!', 'system');
                         return;
                    }
                    
                    const availability = await LanguageModel.availability();
                    this.appendLog(`AI Availability = ${availability}`, 'system');
                    
                    if (availability === 'unavailable') {
                        this.appendLog('Model not available.', 'system');
                        return;
                    }

                    this.appendLog('AI Personalization ready.', 'system');

                } catch (e) {
                    this.appendLog(`Error: ${e.message}`, 'system');
                }
            }

            loadProduct(id) {
                const product = products.find(p => p.id === id);
                // CRITICAL: User requirement to use word "chosen" instead of "sticking with"
                this.appendLog(`User has chosen product: ${product.name}`, 'system');
                this.currentProduct = product;
                this.renderProduct(product);
                
                // Update UI buttons
                document.querySelectorAll('.product-selector button').forEach(b => b.classList.remove('active'));
                const activeBtn = document.getElementById(`btn-prod-${id}`);
                if (activeBtn) activeBtn.classList.add('active');

                // Init hover listeners for new DOM elements
                setTimeout(() => this.tracker.initHoverListeners(), 100);

                // Auto-trigger personalization if interests exist
                if (this.tracker.userInterests.length > 0) {
                    this.triggerPersonalization();
                }
            }

            renderProduct(product) {
                const view = document.getElementById('product-view');
                const categories = Object.keys(product.specs);
                
                view.innerHTML = `
                    <div class="product-layout">
                        <div class="product-image-container">
                            <img src="${product.image}" alt="${product.name}" class="product-image">
                        </div>
                        <div class="product-info">
                            <h2 class="product-title">${product.name}</h2>
                            
                            <div class="tabs-container">
                                ${categories.map((cat, index) => `
                                    <button class="tab-btn ${index === 0 ? 'active' : ''}" data-index="${index}">${cat}</button>
                                `).join('')}
                            </div>

                            <div class="tabs-content">
                                ${Object.entries(product.specs).map(([cat, specs], index) => `
                                    <div class="tab-pane ${index === 0 ? 'active' : ''}" data-pane-index="${index}">
                                        <div class="specs-grid">
                                            ${Object.entries(specs).map(([key, val]) => `
                                                <div class="spec-row" data-spec-value="${val}">
                                                    <div class="spec-label">${key}</div>
                                                    <div class="spec-value">${val}</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="reviews-section">
                                <h3>Community Reviews</h3>
                                ${product.reviews.map(r => `<div class="review-card">${r}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                `;

            }


            async triggerPersonalization() {
                if (typeof LanguageModel === 'undefined') {
                    this.appendLog('LanguageModel not found. Check flags!', 'system');
                    return;
                }

                const interests = this.tracker.userInterests;
                if (interests.length === 0) {
                    this.appendLog('No user interests tracked yet. Click or dwell on features!', 'system');
                    return;
                }

                const logContainer = document.getElementById('log-container');
                const loadingEl = document.createElement('div');
                loadingEl.className = 'log-entry system loading';
                loadingEl.textContent = '✨ AI Personalizing content based on user interests...';
                logContainer.appendChild(loadingEl);
                logContainer.scrollTop = logContainer.scrollHeight;

                const tabClicks = interests.filter(i => i.startsWith('Interested in '));
                const otherInterests = interests.filter(i => !i.startsWith('Interested in '));

                const currentProductText = JSON.stringify({
                    name: this.currentProduct.name,
                    specs: this.currentProduct.specs,
                    reviews: this.currentProduct.reviews
                });

                // CRITICAL: Logging format reqs
                this.appendLog(`Tab Clicks: ${JSON.stringify(tabClicks)} | Other: ${JSON.stringify(otherInterests)} | Context: "${this.currentProduct.name} text..."`, 'ai-input');

                const prompt = `
User Explicit Tab Clicks (Indicating high interest in these categories):
${JSON.stringify(tabClicks)}

Other User Interactions (Dwell time >3s or text selection):
${JSON.stringify(otherInterests)}

Current Product Data:
${currentProductText}

Analyze the Product Data and find text snippets that match the User Interests. Prioritize matches in categories the user clicked on. Break down the matches into specific snippets.
`;

                // CRITICAL: JSON Schema defined by user
                const schema = {
                    type: "object",
                    properties: {
                        highlight_targets: {
                            type: "array",
                            items: {
                                type: "object",
                                properties: {
                                    text_snippet: { type: "string" },
                                    relevance_score: { type: "number" },
                                    category: { type: "string" }
                                },
                                required: ["text_snippet", "relevance_score", "category"]
                            }
                        }
                    },
                    required: ["highlight_targets"],
                    additionalProperties: false
                };

                let session = null;
                try {
                    // Create a clean, fresh one-shot session for this run to prevent kErrorUnknown
                    session = await LanguageModel.create({
                        initialPrompts: [
                            {
                                role: 'system',
                                content: 'You are a shopping assistant. Based on the user\'s past interactions, identify specific text in the current product\'s specs or reviews that matches their interests. Return ONLY valid JSON.'
                            }
                        ]
                    });

                    const response = await session.prompt(prompt, {
                        responseConstraint: schema // Using responseConstraint as per docs
                    });

                    // CRITICAL: Logging format reqs
                    this.appendLog(`Raw JSON: ${response}`, 'ai-output');

                    const result = JSON.parse(response);
                    
                    if (result.highlight_targets) {
                        // Store highlight targets and clear previous removed categories state
                        this.lastHighlightTargets = result.highlight_targets;
                        this.removedCategories.clear();

                        // Scan the new product specs and reviews for any persisted custom interest keywords
                        this.customInterests.forEach(term => {
                            let resolvedCategory = 'Custom';
                            const lowerTerm = term.toLowerCase();

                            if (this.currentProduct && this.currentProduct.specs) {
                                for (const [cat, specs] of Object.entries(this.currentProduct.specs)) {
                                    for (const [specKey, specVal] of Object.entries(specs)) {
                                        if (specKey.toLowerCase().includes(lowerTerm) || specVal.toLowerCase().includes(lowerTerm)) {
                                            resolvedCategory = cat;
                                            break;
                                        }
                                    }
                                    if (resolvedCategory !== 'Custom') break;
                                }
                            }

                            const exists = this.lastHighlightTargets.some(
                                t => t.text_snippet.toLowerCase() === term.toLowerCase()
                            );
                            if (!exists) {
                                this.lastHighlightTargets.push({
                                    text_snippet: term,
                                    relevance_score: 1.0,
                                    category: resolvedCategory
                                });
                            }
                        });

                        this.applyHighlights(this.lastHighlightTargets);
                        
                        // Update toast interface with new badges
                        this.updateToastUI();
                    }
                    this.appendLog('✨ AI Personalization complete.', 'system');

                } catch (e) {
                    this.appendLog(`AI Error: ${e.message}`, 'system');
                    console.error('AI Error:', e);
                } finally {
                    loadingEl.remove();
                    if (session) {
                        try {
                            if (typeof session.destroy === 'function') {
                                session.destroy();
                            }
                        } catch (err) {
                            console.warn('Failed to destroy session:', err);
                        }
                    }
                }
            }

            // --- 4. UI/UX Highlights ---
            applyHighlights(targets) {
                const view = document.querySelector('.product-info') || document.getElementById('product-view');
                let html = view.innerHTML;

                // Filter targets threshold > 0.7 and exclude removed categories
                const filtered = targets.filter(t => t.relevance_score > 0.7 && !this.removedCategories.has(t.category));

                filtered.forEach(target => {
                    const snippet = target.text_snippet;
                    if (!snippet) return;

                    // Simple case-insensitive matching
                    const regex = new RegExp(`(${this.escapeRegex(snippet)})`, 'gi');
                    
                    // Avoid breaking HTML tags by being careful where we replace
                    // A robust implementation would use DOM traversal, but for a prototype, 
                    // a string replace on specific parts or text nodes is safer.
                    // Here we do a simple replace, warning: might break if snippet is inside an attr.
                    
                    this.appendLog(`UI update: Highlighting "${snippet}" with score ${target.relevance_score}.`, 'system');

                    html = html.replace(regex, '<mark>$1</mark>');
                });

                view.innerHTML = html;

                // Update tab highlight indicators
                const panes = view.querySelectorAll('.tab-pane');
                panes.forEach(pane => {
                    const index = pane.getAttribute('data-pane-index');
                    const hasHighlight = pane.querySelector('mark') !== null;
                    const btn = view.querySelector(`.tab-btn[data-index="${index}"]`);
                    if (btn) {
                        if (hasHighlight) {
                            btn.classList.add('has-highlight');
                        } else {
                            btn.classList.remove('has-highlight');
                        }
                    }
                });

                // Re-attach hover listeners since innerHTML destroyed them
                setTimeout(() => this.tracker.initHoverListeners(), 100);
            }

            updateToastUI() {
                let toast = document.querySelector('.toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.className = 'toast';
                    document.body.appendChild(toast);
                }

                const activeCategories = [...new Set(
                    this.lastHighlightTargets
                        .filter(t => !this.removedCategories.has(t.category) && t.relevance_score > 0.7)
                        .map(t => t.category)
                )];

                // Retain expanded state class
                if (this.isTunePanelExpanded) {
                    toast.classList.add('expanded');
                } else {
                    toast.classList.remove('expanded');
                }

                toast.innerHTML = '';

                // --- Header Area ---
                const headerDiv = document.createElement('div');
                headerDiv.className = 'toast-header';

                const titleSpan = document.createElement('span');
                titleSpan.className = 'toast-title';
                titleSpan.innerHTML = '<mark>Highlighting</mark> what matters to you:';
                headerDiv.appendChild(titleSpan);

                toast.appendChild(headerDiv);

                // --- Badges Container ---
                const badgeContainer = document.createElement('div');
                badgeContainer.className = 'badge-container';

                if (activeCategories.length === 0) {
                    const emptyMsg = document.createElement('span');
                    emptyMsg.style.fontSize = '0.72rem';
                    emptyMsg.style.color = 'var(--text-muted)';
                    emptyMsg.style.fontStyle = 'italic';
                    emptyMsg.style.padding = '0.2rem 0';
                    emptyMsg.textContent = 'No active highlights. Start browsing to teach HyperAudio what to highlight for you, or customize manually.';
                    badgeContainer.appendChild(emptyMsg);
                } else {
                    activeCategories.forEach(cat => {
                        const badge = document.createElement('span');
                        badge.className = 'interest-badge';
                        badge.textContent = cat + ' ';

                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'interest-badge-remove';
                        removeBtn.innerHTML = '&times;';
                        removeBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.removeInterest(cat);
                        });

                        badge.appendChild(removeBtn);
                        badgeContainer.appendChild(badge);
                    });
                }

                toast.appendChild(badgeContainer);

                // --- Toggle Button ("Customize highlights ▾ / ▴") ---
                const tuneToggle = document.createElement('button');
                tuneToggle.className = 'toast-tune-toggle';
                tuneToggle.innerHTML = this.isTunePanelExpanded ? 'Customize highlights &and;' : 'Customize highlights &or;';
                tuneToggle.addEventListener('click', () => {
                    this.isTunePanelExpanded = !this.isTunePanelExpanded;
                    this.updateToastUI();
                });
                toast.appendChild(tuneToggle);

                // --- Tuning Control Panel (Drawer) ---
                const tunePanel = document.createElement('div');
                tunePanel.className = 'toast-tune-panel';

                // 1. Active Personalization Rules (Currently highlighted)
                const activeTargets = this.lastHighlightTargets.filter(
                    t => t.relevance_score > 0.7 && !this.removedCategories.has(t.category)
                );

                if (activeTargets.length > 0) {
                    const activeSection = document.createElement('div');
                    activeSection.className = 'tune-section';
                    
                    const activeTitle = document.createElement('div');
                    activeTitle.className = 'tune-section-title';
                    activeTitle.textContent = 'Currently highlighted';
                    activeSection.appendChild(activeTitle);

                    activeTargets.forEach(target => {
                        const item = document.createElement('div');
                        item.className = 'tune-item';

                        const text = document.createElement('span');
                        text.className = 'tune-item-text';
                        text.innerHTML = `${target.text_snippet} <span class="tune-item-category">${target.category}</span>`;
                        text.title = `${target.text_snippet} (${target.category})`;
                        item.appendChild(text);

                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'tune-item-remove';
                        removeBtn.innerHTML = '&times;';
                        removeBtn.title = 'Remove Highlight';
                        removeBtn.addEventListener('click', () => this.removeSignalTarget(target.text_snippet));
                        item.appendChild(removeBtn);

                        activeSection.appendChild(item);
                    });

                    tunePanel.appendChild(activeSection);
                }

                // 2. Add Custom Interest Signal (Add custom highlight)
                const addSection = document.createElement('div');
                addSection.className = 'tune-section';

                const addTitle = document.createElement('div');
                addTitle.className = 'tune-section-title';
                addTitle.textContent = 'Add custom highlight';
                addSection.appendChild(addTitle);

                const addBox = document.createElement('div');
                addBox.className = 'tune-add-box';

                const addInput = document.createElement('input');
                addInput.type = 'text';
                addInput.className = 'tune-add-input';
                addInput.placeholder = 'Type keyword to highlight...';
                addInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const kw = addInput.value.trim();
                        if (kw.length > 0) {
                            this.addCustomInterest(kw);
                        }
                    }
                });
                addBox.appendChild(addInput);

                const addBtn = document.createElement('button');
                addBtn.className = 'tune-add-btn';
                addBtn.innerHTML = '+';
                addBtn.addEventListener('click', () => {
                    const kw = addInput.value.trim();
                    if (kw.length > 0) {
                        this.addCustomInterest(kw);
                    }
                });
                addBox.appendChild(addBtn);

                addSection.appendChild(addBox);
                tunePanel.appendChild(addSection);

                toast.appendChild(tunePanel);

                // Trigger class after DOM insertion to play transition
                setTimeout(() => toast.classList.add('show'), 10);
            }

            removeInterest(category) {
                this.removedCategories.add(category);

                const beforeCount = this.tracker.userInterests.length;
                this.tracker.userInterests = this.tracker.userInterests.filter(interest => {
                    const term = category.toLowerCase();
                    return !interest.toLowerCase().includes(term);
                });
                this.appendLog(`State update: Removed "${category}" from tracking history (Interests: ${beforeCount} -> ${this.tracker.userInterests.length}).`, 'system');

                // Re-render current product and apply remaining highlights
                this.renderProduct(this.currentProduct);
                const filteredTargets = this.lastHighlightTargets.filter(t => !this.removedCategories.has(t.category));
                this.applyHighlights(filteredTargets);

                // Update toast view
                this.updateToastUI();
            }

            removeSignalTarget(snippet) {
                const beforeCount = this.lastHighlightTargets.length;
                this.lastHighlightTargets = this.lastHighlightTargets.filter(t => t.text_snippet !== snippet);
                
                // Clean up from persisted custom interests
                this.customInterests = this.customInterests.filter(term => term.toLowerCase() !== snippet.toLowerCase());
                
                // Clean up from tracker history
                this.tracker.userInterests = this.tracker.userInterests.filter(term => term.toLowerCase() !== snippet.toLowerCase());

                this.appendLog(`Tuning: Removed signal "${snippet}" from rules list (Rules: ${beforeCount} -> ${this.lastHighlightTargets.length}).`, 'system');

                // Re-apply highlights with updated rules list
                this.renderProduct(this.currentProduct);
                this.applyHighlights(this.lastHighlightTargets);
                this.updateToastUI();
            }

            addCustomInterest(keyword) {
                // Clean keyword
                const term = keyword.trim();
                if (!term) return;

                // Persist custom interest
                if (!this.customInterests.includes(term)) {
                    this.customInterests.push(term);
                }

                // Push to behavior tracker to train the model context
                if (!this.tracker.userInterests.includes(term)) {
                    this.tracker.userInterests.push(term);
                }

                // 1. Resolve category based on product specs matching
                let resolvedCategory = 'Custom';
                const lowerTerm = term.toLowerCase();

                if (this.currentProduct && this.currentProduct.specs) {
                    for (const [cat, specs] of Object.entries(this.currentProduct.specs)) {
                        for (const [specKey, specVal] of Object.entries(specs)) {
                            if (specKey.toLowerCase().includes(lowerTerm) || specVal.toLowerCase().includes(lowerTerm)) {
                                resolvedCategory = cat;
                                break;
                            }
                        }
                        if (resolvedCategory !== 'Custom') break;
                    }
                }

                // Fallback to active tab if not matched in spec scan
                if (resolvedCategory === 'Custom') {
                    const activeTabBtn = document.querySelector('.tab-btn.active');
                    if (activeTabBtn) {
                        const activeIndex = activeTabBtn.getAttribute('data-index');
                        const tabKeys = Object.keys(this.currentProduct.specs);
                        if (tabKeys[activeIndex]) {
                            resolvedCategory = tabKeys[activeIndex];
                        }
                    }
                }

                // Make sure this category is no longer listed as "removed"
                this.removedCategories.delete(resolvedCategory);

                // 2. Add custom target to active personalization rules
                const newTarget = {
                    text_snippet: term,
                    relevance_score: 1.0,
                    category: resolvedCategory
                };

                // Check if already exists
                const exists = this.lastHighlightTargets.some(
                    t => t.text_snippet.toLowerCase() === term.toLowerCase()
                );

                if (!exists) {
                    this.lastHighlightTargets.push(newTarget);
                    this.appendLog(`Tuning: Added custom highlight target "${term}" in category "${resolvedCategory}" with score 1.0.`, 'system');

                    // Re-apply highlights with the new rules
                    this.renderProduct(this.currentProduct);
                    this.applyHighlights(this.lastHighlightTargets);
                    this.updateToastUI();
                } else {
                    this.appendLog(`Tuning: Signal "${term}" already exists in interest graph.`, 'system');
                }
            }

            escapeRegex(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            appendLog(text, type) {
                const container = document.getElementById('log-container');
                const el = document.createElement('div');
                el.className = `log-entry ${type}`;
                el.textContent = `[${type.toUpperCase()}]: ${text}`;
                container.appendChild(el);
                container.scrollTop = container.scrollHeight;
            }

            clearLogs() {
                document.getElementById('log-container').innerHTML = '';
            }
        }

        // Initialize App
        const app = new App();
    </script>
</body>
</html>
