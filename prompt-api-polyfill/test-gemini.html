<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt API Gemini Test</title>
    <style>
      body {
        font-family: system-ui;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      progress {
        width: 100%;
        height: 2rem;
      }
      #status {
        margin-top: 1rem;
        font-weight: bold;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        overflow-x: auto;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Prompt API Gemini Test</h1>
    <p>This page tests the Gemini backend configuration with an explicit API key.</p>
    
    <label for="progress">Model Download Progress:</label>
    <progress id="progress" value="0" max="1"></progress>
    
    <div id="status">Ready</div>
    <pre id="output"></pre>

    <script type="module">
      // Gemini backend configuration imported from a JSON file to avoid committing the API key
      import geminiConfig from './.env-gemini.json' with { type: 'json' };
      window.GEMINI_CONFIG = geminiConfig;
      
      import './prompt-api-polyfill.js';

      const status = document.getElementById('status');
      const output = document.getElementById('output');
      const progressBar = document.getElementById('progress');

      async function runTest() {
        try {
          status.textContent = 'Initializing LanguageModel (Gemini)...';
          const session = await LanguageModel.create({
            monitor: (m) => {
              m.addEventListener('downloadprogress', (e) => {
                console.log('Download progress:', e.loaded);
                progressBar.value = e.loaded;
                status.textContent = `Downloading model: ${Math.round(e.loaded * 100)}%`;
              });
            }
          });

          status.textContent = 'Session created. Sending prompt...';
          const response = await session.prompt('What is 2+2? Answer in one word.');
          output.textContent = response;
          status.textContent = 'Done!';
        } catch (err) {
          console.error(err);
          status.textContent = 'Error: ' + err.message;
        }
      }

      runTest();
    </script>
  </body>
</html>
